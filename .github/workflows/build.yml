name: Build Flex Yemen

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Save code
        run: |
          mkdir /tmp/code
          cp -r lib assets pubspec.yaml /tmp/code/

      - name: Clean and recreate project
        run: |
          rm -rf .gitignore android ios linux macos web windows
          flutter create --org com.flexyemen .

      - name: Restore code
        run: cp -r /tmp/code/* .

      - name: Fix desugaring
        run: |
          echo 'dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"
}' >> android/app/build.gradle

      - name: Build
        run: flutter build apk --release --split-per-abi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: build/app/outputs/flutter-apk/*.apk
