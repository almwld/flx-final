name: Build Flex Yemen

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Save user code
        run: |
          # حفظ الكود الخاص بالمستخدم
          mkdir -p /tmp/user_code
          cp -r lib /tmp/user_code/
          cp -r assets /tmp/user_code/ 2>/dev/null || true
          cp pubspec.yaml /tmp/user_code/
          cp -r .github /tmp/user_code/ 2>/dev/null || true
          cp README.md /tmp/user_code/ 2>/dev/null || true
          cp codemagic.yaml /tmp/user_code/ 2>/dev/null || true

      - name: Delete old Flutter project files
        run: |
          # حذف كل شيء باستثناء مجلد .git
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.github' -exec rm -rf {} \; 2>/dev/null || true

      - name: Create fresh Flutter project
        run: |
          # إنشاء مشروع Flutter جديد
          flutter create --org com.flexyemen --project-name flex_yemen .

      - name: Restore user code
        run: |
          # استعادة كود المستخدم
          cp -r /tmp/user_code/lib/* lib/ 2>/dev/null || true
          cp -r /tmp/user_code/assets/* assets/ 2>/dev/null || true
          cp /tmp/user_code/pubspec.yaml . 2>/dev/null || true
          cp -r /tmp/user_code/.github . 2>/dev/null || true
          cp /tmp/user_code/README.md . 2>/dev/null || true
          cp /tmp/user_code/codemagic.yaml . 2>/dev/null || true

      - name: Enable desugaring in build.gradle
        run: |
          # تمكين desugaring في ملف build.gradle
          sed -i '/compileOptions {/a \                coreLibraryDesugaringEnabled true' android/app/build.gradle
          
          # إضافة dependency desugar_jdk_libs
          sed -i '/dependencies {/a \    coreLibraryDesugaring '\''com.android.tools:desugar_jdk_libs:2.0.4'\''' android/app/build.gradle
          
          # إضافة multiDexEnabled
          sed -i '/defaultConfig {/a \                multiDexEnabled true' android/app/build.gradle
          
          # تحديث minSdk إلى 21
          sed -i 's/minSdk [0-9]*/minSdk 21/g' android/app/build.gradle

      - name: Set app name and package
        run: |
          # تغيير اسم التطبيق
          sed -i 's/android:label="flex_yemen"/android:label="Flex Yemen Market"/g' android/app/src/main/AndroidManifest.xml
          
          # تحديث package name
          sed -i 's/package="com.example.flex_yemen"/package="com.flexyemen.flex_yemen"/g' android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (split-per-abi)
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
