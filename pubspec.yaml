name: flex_yemen
description: Flex Yemen E-commerce Platform
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  supabase_flutter: ^2.0.0
  carousel_slider: ^5.1.2
  flutter_svg: ^2.0.17
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  url_launcher: ^6.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  flutter_dotenv: ^5.1.0
  file_picker: ^8.0.0+1
  permission_handler: ^11.3.1
  share_plus: ^10.1.4
  http: ^1.2.1
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  flutter_screenutil: ^5.9.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  adaptive_icon_background: "#D4AF37"
  adaptive_icon_foreground: "assets/icons/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  fonts:
    - family: Changa
      fonts:
        - asset: assets/fonts/Changa-SemiBold.ttf
          weight: 600
  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/svg/
    - assets/animations/
    - .env
