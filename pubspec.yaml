name: flex_yemen
description: منصة التجارة الإلكترونية اليمنية
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  supabase_flutter: ^2.5.0
  flutter_dotenv: ^5.1.0
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.3
  hive_flutter: ^2.0.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  carousel_slider: ^4.2.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  qr_flutter: ^4.1.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  image_picker: ^1.1.1
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.3
  crypto: ^3.0.3
  encrypt: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - .env
  
  fonts:
    - family: Changa
      fonts:
        - asset: assets/fonts/Changa-Regular.ttf
        - asset: assets/fonts/Changa-Bold.ttf
          weight: 700
